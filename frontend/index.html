<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuChat — Full-Stack RAG Chatbot over PDFs</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 28px;
    }

    .sub {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    input[type=file] {
      color: #e2e8f0;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      box-sizing: border-box;
    }

    button {
      background: #3b82f6;
      color: white;
      border: 0;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .answer {
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .sources {
      margin-top: 12px;
      font-size: 13px;
      color: #94a3b8;
    }

    .src {
      border-left: 3px solid #3b82f6;
      padding: 6px 10px;
      margin-top: 6px;
      background: #0f172a;
      border-radius: 4px;
    }

    .pill {
      display: inline-block;
      background: #334155;
      padding: 2px 8px;
      border-radius: 12px;
      margin-right: 6px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
